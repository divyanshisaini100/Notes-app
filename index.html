<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
        <meta name = "description" content = "This is a notes app">
        <title>Notes App</title>
        <!-- <link rel = "icon" href = "" type = "image/png"> -->
        <link rel="stylesheet" href = "styles.css"> 
    </head>
    <body>
        <header class="flexbox">
            <h1 id="intro">Divyanshi's Notes</h1> 
            <div>
                <img class="add" src="" alt="+">
                <button class="add" type="button">Add Note</button> 
            </div>
        </header>
        <main>
            <div class="popup hidden">
                <div class="popup-content">
                    <h1>Add Note</h1>
                    <div class="input">
                        <h3>Title</h3>
                        <input placeholder="Title" type="text" id="title">
                    </div>
                    <div class="textarea">
                        <h3>Content</h3>
                        <textarea placeholder="Write your note here..." id="content"></textarea>
                    </div>                    
                    <button type="button" id="savebtn">Save</button>
                </div>
            </div>
            <div class="notes_list">
                
            </div>
        </main>
    </body>
    <script src="script.js" defer></script>
</html>
